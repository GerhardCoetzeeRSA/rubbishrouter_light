<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Payment Successful | RubbishRouter</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root { --primary: #27ae60; --dark: #2c3e50; --accent: #f7941d; }
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .success-card { background: white; padding: 40px; border-radius: 25px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); text-align: center; max-width: 400px; width: 90%; }
        .icon-circle { width: 80px; height: 80px; background: #e8f5e9; color: var(--primary); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 40px; margin: 0 auto 20px; border: 2px solid var(--primary); }
        h1 { color: var(--dark); margin: 0 0 10px 0; }
        p { color: #666; line-height: 1.5; margin-bottom: 30px; }
        .btn-return { background: var(--primary); color: white; border: none; padding: 18px 30px; border-radius: 12px; font-weight: bold; cursor: pointer; font-size: 16px; width: 100%; text-decoration: none; display: inline-block; box-sizing: border-box; }
        .conf-number { font-family: monospace; background: #eee; padding: 5px 10px; border-radius: 4px; font-size: 12px; color: #444; }
    </style>
</head>
<body>

<div class="success-card">
    <div class="icon-circle">✓</div>
    <h1>Payment Received!</h1>
    <p>Thank you for supporting your local community network. Your access has been updated.</p>
    
    <div style="margin-bottom: 30px;">
        <small style="color:#aaa; display:block; margin-bottom:5px;">TRANSACTION SECURE</small>
        <span class="conf-number" id="ref-display">RR-SUCCESS</span>
    </div>

    <a href="index.html" class="btn-return">BACK TO LIVE MAP</a>
    
    <p style="font-size: 11px; margin-top: 20px; color: #999;">
        Processed by Coetzee Data AI Consultants (Pty) Ltd<br>
        via Zapper Secure Gateway
    </p>
</div>

<script>
    // Pull the reference from the URL if Zapper passes it back, or show a generic one
    const urlParams = new URLSearchParams(window.location.search);
    const ref = urlParams.get('reference');
    if(ref) {
        document.getElementById('ref-display').innerText = ref;
    }
</script>

</body>
</html>
