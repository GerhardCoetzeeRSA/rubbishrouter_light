<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>RubbishRouter | Welcome</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root { --primary: #27ae60; --dark: #2c3e50; --accent: #f1c40f; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #f4f7f6; display: flex; flex-direction: column; align-items: center; }
        .hero { background: var(--primary); color: white; width: 100%; padding: 40px 20px; text-align: center; box-sizing: border-box; }
        .container { max-width: 450px; width: 90%; padding: 20px; text-align: center; }
        .card { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); margin-top: -30px; }
        
        select, button, input { width: 100%; padding: 15px; margin: 10px 0; border-radius: 10px; border: 1px solid #ddd; font-size: 16px; box-sizing: border-box; }
        button { background: var(--primary); color: white; border: none; font-weight: bold; cursor: pointer; }
        .btn-add { background: none; color: var(--primary); border: 2px dashed var(--primary); margin-top: 5px; font-size: 14px; }
        
        #new-town-name { display: none; border: 2px solid var(--accent); }
    </style>
</head>
<body>

    <div class="hero">
        <h1>RubbishRouter</h1>
        <p>Smart City Community Network</p>
    </div>

    <div class="container">
        <div class="card">
            <h3>Select Your Municipality</h3>
            
            <select id="muni-select">
                <option value="">Loading towns...</option>
            </select>

            <button onclick="goToApp()">ENTER LIVE MAP</button>

            <div id="add-area">
                <button class="btn-add" id="show-add-btn" onclick="toggleAdd()">+ My town isn't listed</button>
                <input type="text" id="new-town-name" placeholder="Enter Town Name (e.g. Rustenburg)">
                <button id="save-town-btn" style="display:none; background:var(--dark);" onclick="addNewTown()">REGISTER TOWN</button>
            </div>
            
            <a href="how-it-works.html" style="display:block; margin-top:20px; color:#666; font-size:14px; text-decoration:none;">❓ How it works & Pricing</a>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-app.js";
        import { getDatabase, ref, onValue, set, get } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAm4QtyA82HBJ-VwBgIlzRHmDgzxxhryNY",
            databaseURL: "https://rubbishrouter-688b2-default-rtdb.firebaseio.com/",
            projectId: "rubbishrouter-688b2",
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const listRef = ref(db, 'registry/towns');

        // 1. Load towns from Firebase
        onValue(listRef, (snap) => {
            const select = document.getElementById('muni-select');
            select.innerHTML = "";
            const towns = snap.val();
            
            if (towns) {
                Object.keys(towns).forEach(t => {
                    let opt = document.createElement('option');
                    opt.value = t;
                    opt.innerHTML = t;
                    select.appendChild(opt);
                });
            } else {
                // Default if list is empty
                let opt = document.createElement('option');
                opt.value = "Potchefstroom";
                opt.innerHTML = "Potchefstroom";
                select.appendChild(opt);
            }
        });

        // 2. Navigation
        window.goToApp = () => {
            const muni = document.getElementById('muni-select').value;
            if(!muni) return alert("Please select or add a town.");
            window.location.href = `light.html?v=3&muni=${muni}`;
        };

        // 3. Add New Town UI
        window.toggleAdd = () => {
            document.getElementById('new-town-name').style.display = 'block';
            document.getElementById('save-town-btn').style.display = 'block';
            document.getElementById('show-add-btn').style.display = 'none';
        };

        // 4. Save New Town to Firebase
        window.addNewTown = async () => {
            const name = document.getElementById('new-town-name').value.trim();
            if(!name || name.length < 3) return alert("Please enter a valid town name.");
            
            // Format name (Proper Case)
            const formattedName = name.charAt(0).toUpperCase() + name.slice(1).toLowerCase();
            
            const townRef = ref(db, `registry/towns/${formattedName}`);
            await set(townRef, { active: true, createdAt: Date.now() });
            
            alert(`${formattedName} has been added! You can now select it from the list.`);
            location.reload();
        };
    </script>
</body>
</html>
