<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>RubbishRouter | Secure Payment</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: #f4f7f6; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        .card { background: white; border-radius: 24px; box-shadow: 0 10px 40px rgba(0,0,0,0.12); padding: 36px 28px; max-width: 400px; width: 100%; text-align: center; }
        .brand { font-size: 13px; font-weight: 900; color: #27ae60; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 6px; }
        h2  { font-size: 22px; font-weight: 900; color: #2c3e50; margin-bottom: 8px; }
        .sub { font-size: 13px; color: #7f8c8d; line-height: 1.5; margin-bottom: 24px; }
        .price-wrap { background: #f0faf5; border-radius: 16px; padding: 20px; margin-bottom: 24px; }
        .price { font-size: 52px; font-weight: 900; color: #27ae60; line-height: 1; }
        .price span { font-size: 20px; font-weight: 700; }
        .price-note { font-size: 11px; color: #95a5a6; margin-top: 6px; }

        .btn-zapper { width: 100%; padding: 18px; border: none; border-radius: 14px; background: #f7941d; color: white; font-size: 17px; font-weight: 900; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 12px; box-shadow: 0 6px 20px rgba(247,148,29,0.4); transition: opacity 0.15s, transform 0.1s; margin-bottom: 12px; }
        .btn-zapper:hover  { opacity: 0.92; }
        .btn-zapper:active { transform: scale(0.97); }
        .btn-zapper:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-back { width: 100%; padding: 14px; background: none; border: 1.5px solid #e2e8f0; border-radius: 12px; font-size: 13px; font-weight: 700; color: #7f8c8d; cursor: pointer; }

        .spinner { display: none; width: 22px; height: 22px; border: 3px solid rgba(255,255,255,0.35); border-top-color: white; border-radius: 50%; animation: spin 0.7s linear infinite; flex-shrink: 0; }
        @keyframes spin { to { transform: rotate(360deg); } }

        #status-box { display: none; padding: 12px 16px; border-radius: 12px; margin-bottom: 16px; font-size: 13px; font-weight: 700; }
        #status-box.info  { background: #f0faf5; color: #27ae60; border: 1px solid #86efac; }
        #status-box.error { background: #fef2f2; color: #e74c3c; border: 1px solid #fca5a5; }

        .secure-note { font-size: 11px; color: #bdc3c7; margin-top: 20px; line-height: 1.7; }
        .secure-note strong { color: #95a5a6; }
        .foot-link { display: block; margin-top: 14px; font-size: 11px; color: #bdc3c7; text-decoration: none; }
    </style>
</head>
<body>
<div class="card">
    <div class="brand">🗑️ RubbishRouter</div>
    <h2>Resident Access</h2>
    <p class="sub">Subscribe to keep receiving live truck alerts for your street.</p>
    <div class="price-wrap">
        <div class="price">R15<span>/pm</span></div>
        <div class="price-note">Cancel anytime · No long-term contract</div>
    </div>
    <div id="status-box"></div>
    <button class="btn-zapper" id="pay-btn" onclick="pay()">
        <svg id="btn-icon" width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
        <div class="spinner" id="spinner"></div>
        <span id="btn-label">PAY R15 WITH ZAPPER</span>
    </button>
    <button class="btn-back" onclick="history.back()">← Go Back</button>
    <div class="secure-note">🔒 Secure payment via <strong>Zapper</strong><br><strong>Coetzee Data AI Consultants (Pty) Ltd</strong></div>
    <a href="legal.html" class="foot-link">Terms & Privacy Policy</a>
</div>
<script>
    const CLOUD_FN    = "https://us-central1-rubbishrouter-688b2.cloudfunctions.net/createZapperInvoice";
    const SUCCESS_URL = "https://gerhardcoetzeersa.github.io/rubbishrouter_light/success.html";

    function setLoading(on) {
        document.getElementById('pay-btn').disabled                   = on;
        document.getElementById('spinner').style.display              = on ? 'block' : 'none';
        document.getElementById('btn-icon').style.display             = on ? 'none'  : 'block';
        document.getElementById('btn-label').textContent              = on ? 'Opening Zapper...' : 'PAY R15 WITH ZAPPER';
    }
    function setStatus(msg, type) {
        const el = document.getElementById('status-box');
        el.textContent   = msg;
        el.className     = type;
        el.style.display = msg ? 'block' : 'none';
    }

    async function pay() {
        setLoading(true);
        setStatus('', '');
        const reference = 'RR_' + Date.now();
        localStorage.setItem('rr_pending_ref', reference);

        try {
            const res = await fetch(CLOUD_FN, {
                method:  'POST',
                headers: { 'Content-Type': 'application/json' },
                body:    JSON.stringify({ amountCents: 1500, reference, successUrl: SUCCESS_URL + '?reference=' + reference })
            });
            if (!res.ok) throw new Error('fn_error');
            const { appLink } = await res.json();
            if (!appLink) throw new Error('no_link');
            setStatus('Redirecting to Zapper...', 'info');
            setTimeout(() => window.location.href = appLink, 400);
        } catch(e) {
            // Cloud Function failed — show manual Zapper instruction
            setLoading(false);
            setStatus('Could not connect automatically. Please open your Zapper app and pay to: Coetzee Data AI Consultants — R15.00', 'error');
        }
    }
</script>
</body>
</html>
